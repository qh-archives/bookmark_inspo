<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      padding: 20px;
    }
    .logo { font-size: 28px; text-align: center; margin-bottom: 10px; }
    h2 { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #8888aa; text-align: center; margin-bottom: 18px; }

    .status-box {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .status-row:last-child { margin-bottom: 0; }
    .label { font-size: 11px; color: #8888aa; }
    .value { font-size: 12px; font-weight: 600; color: #e8e8f0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; display: inline-block; margin-right: 5px; }
    .dot.off { background: #f87171; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #7c5cfc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #6d4ef0; }
    .btn.secondary {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.1);
      color: #8888aa;
      margin-top: 8px;
    }
    .btn.secondary:hover { color: #e8e8f0; border-color: rgba(255,255,255,0.2); }

    .tip {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(124,92,252,0.1);
      border: 1px solid rgba(124,92,252,0.25);
      border-radius: 8px;
      font-size: 11px;
      color: #a78bfa;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">🔖</div>
  <h2>Bookmarks Canvas</h2>
  <p class="sub">Auto-syncing your Twitter bookmarks</p>

  <div class="status-box">
    <div class="status-row">
      <span class="label">Server</span>
      <span class="value" id="server-status"><span class="dot off"></span>Checking…</span>
    </div>
    <div class="status-row">
      <span class="label">Saved today</span>
      <span class="value" id="count">—</span>
    </div>
  </div>

  <a href="http://127.0.0.1:5173" target="_blank" class="btn">Open Canvas →</a>
  <a href="https://x.com/i/bookmarks" target="_blank" class="btn secondary">Go to Bookmarks page</a>

  <div class="tip">
    💡 Visit your <strong>Bookmarks page</strong> on X to bulk-import everything at once, or just bookmark tweets normally and they'll appear instantly.
  </div>

  <script src="popup.js"></script>
</body>
</html>
